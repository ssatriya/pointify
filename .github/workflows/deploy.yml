name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, curl, zip, pgsql, bcmath, intl, tokenizer, ctype, fileinfo, gd

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            if [ ! -d "/var/www/pointify" ]; then
              echo ">>> First deploy: cloning repo..."
              sudo mkdir -p /var/www
              sudo chown -R ubuntu:ubuntu /var/www
              git clone https://github.com/ssatriya/pointify.git /var/www/pointify
              cd /var/www/pointify
              echo "${{ secrets.VPS_ENV_FILE }}" > .env
              php artisan key:generate
              php artisan storage:link
            fi

            cd /var/www/pointify
            sudo chown -R ubuntu:ubuntu /var/www/pointify
            git fetch origin
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction
            npm ci
            npm run build
            php artisan down --retry=5
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan queue:restart
            sudo chown -R www-data:www-data /var/www/pointify/storage
            sudo chown -R www-data:www-data /var/www/pointify/bootstrap/cache
            php artisan up
            echo ">>> Deploy completed successfully!"